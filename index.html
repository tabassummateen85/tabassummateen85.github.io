<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rizwan Ali Jeans | Enterprise Edition</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root { --p: #000; --s: #25D366; --err: #ff3333; --bg: #fdfdfd; --card: #ffffff; }
    * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
    body { margin: 0; background: var(--bg); color: var(--p); overflow-x: hidden; }

    /* LAYOUT ENGINE */
    .view { display: none; padding: 40px 5%; min-height: 90vh; animation: fadeIn 0.4s ease; }
    .view.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* NAVIGATION */
    .navbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 5%; background: var(--p); color: white; position: sticky; top: 0; z-index: 1000;
    }
    .nav-links { display: flex; gap: 20px; align-items: center; }
    .nav-links a { color: white; text-decoration: none; cursor: pointer; font-size: 13px; font-weight: 600; text-transform: uppercase; }
    .cart-trigger { position: relative; cursor: pointer; display: flex; align-items: center; }
    #cart-badge { position: absolute; top: -8px; right: -12px; background: var(--s); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; }

    /* SHOP UI */
    .filter-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
    .f-btn { padding: 8px 18px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 30px; font-size: 14px; }
    .f-btn.active { background: var(--p); color: white; border-color: var(--p); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
    .card { background: var(--card); border: 1px solid #eee; border-radius: 12px; overflow: hidden; transition: 0.3s; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .card img { width: 100%; height: 400px; object-fit: cover; }
    .card-body { padding: 20px; }
    .price-tag { font-size: 1.4rem; font-weight: 900; }
    
    /* CART PAGE */
    .cart-container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; border: 1px solid #eee; }
    .cart-row { display: grid; grid-template-columns: 100px 1fr 120px 80px; gap: 20px; align-items: center; padding: 15px 0; border-bottom: 1px solid #f5f5f5; }
    .checkout-box { margin-top: 30px; padding-top: 20px; border-top: 2px solid var(--p); text-align: right; }

    /* ADMIN PANEL */
    .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
    .input-group input, .input-group select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
    .stock-low { color: var(--err); font-weight: bold; }

    /* BUTTONS */
    .btn { padding: 14px 24px; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.3s; text-align: center; text-decoration: none; display: inline-block; }
    .btn-p { background: var(--p); color: white; width: 100%; }
    .btn-s { background: var(--s); color: white; }

    @media (max-width: 768px) { .admin-grid, .cart-row { grid-template-columns: 1fr; } .cart-row img { display: none; } }
  </style>
</head>
<body>

  <nav class="navbar">
    <div onclick="navigateTo('shop')" style="cursor:pointer; font-weight:900; letter-spacing:2px;">RIZWAN ALI JEANS</div>
    <div class="nav-links">
      <a onclick="navigateTo('shop')">Shop</a>
      <a onclick="navigateTo('admin')">Admin</a>
      <div class="cart-trigger" onclick="navigateTo('cart')">
        <i data-lucide="shopping-bag"></i>
        <span id="cart-badge">0</span>
      </div>
    </div>
  </nav>

  <section id="shop" class="view active">
    <div class="filter-bar" id="filters">
      <button class="f-btn active" onclick="filterShop('All')">All</button>
    </div>
    <div id="shop-grid" class="grid"></div>
  </section>

  <section id="cart" class="view">
    <h2 style="text-align:center; font-size: 2.5rem;">Shopping Cart</h2>
    <div class="cart-container">
      <div id="cart-list"></div>
      <div id="cart-summary" class="checkout-box">
        <h3 id="grand-total">Total: 0€</h3>
        <button class="btn btn-s" onclick="startPaymentFlow()">PROCEED TO CHECKOUT</button>
      </div>
    </div>
  </section>

  <section id="admin" class="view">
    <h2 class="section-title">Store Management</h2>
    <div class="admin-grid">
      <div class="input-group" style="background:white; padding:25px; border-radius:12px; border:1px solid #eee;">
        <h3>Add New Product</h3>
        <input type="text" id="a-name" placeholder="Product Name">
        <input type="text" id="a-color" placeholder="Color (e.g. Light Blue)">
        <input type="number" id="a-price" value="15" placeholder="Price (€)">
        <input type="number" id="a-stock" placeholder="Initial Stock">
        <input type="text" id="a-img" placeholder="Image File (e.g. IMG-20260418-WA0001.jpg)">
        <button class="btn btn-p" onclick="addProduct()">SAVE TO DATABASE</button>
      </div>
      <div style="background:white; padding:25px; border-radius:12px; border:1px solid #eee; overflow-x:auto;">
        <h3>Live Inventory</h3>
        <table style="width:100%; text-align:left; border-collapse:collapse;">
          <tbody id="admin-table-body"></tbody>
        </table>
      </div>
    </div>
  </section>

  <script>
    // --- CORE DATABASE ---
    const defaultData = [
      { id: 1, name: "Light Denim Slim", color: "Light Blue", price: 15, stock: 12, img: "IMG-20260418-WA0001.jpg" },
      { id: 2, name: "Midnight Tapered", color: "Black", price: 15, stock: 8, img: "IMG-20260418-WA0003.jpg" },
      { id: 3, name: "Oceanic Straight", color: "Dark Blue", price: 15, stock: 15, img: "IMG-20260418-WA0002.jpg" }
    ];

    let db = JSON.parse(localStorage.getItem('rizwan_pro_db')) || defaultData;
    let cart = JSON.parse(localStorage.getItem('rizwan_pro_cart')) || [];

    // --- NAVIGATION ENGINE ---
    function navigateTo(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
      window.scrollTo(0,0);
      if(viewId === 'shop') renderShop();
      if(viewId === 'cart') renderCartPage();
      if(viewId === 'admin') renderAdmin();
    }

    // --- SHOP LOGIC ---
    function renderShop(filter = 'All') {
      const grid = document.getElementById('shop-grid');
      const colors = ['All', ...new Set(db.map(p => p.color))];
      
      document.getElementById('filters').innerHTML = colors.map(c => `
        <button class="f-btn ${filter === c ? 'active' : ''}" onclick="renderShop('${c}')">${c}</button>
      `).join('');

      const products = filter === 'All' ? db : db.filter(p => p.color === filter);
      grid.innerHTML = products.map(p => `
        <div class="card">
          <img src="${p.img}">
          <div class="card-body">
            <h3>${p.name}</h3>
            <p style="color:gray; font-size:14px; margin-top:-10px;">${p.color} | ${p.stock > 0 ? p.stock + ' left' : 'Out of Stock'}</p>
            <div style="display:flex; justify-content:space-between; align-items:center; margin:15px 0;">
              <span class="price-tag">${p.price}€</span>
              <select id="size-${p.id}" style="padding:5px;">
                <option value="32">32</option><option value="34">34</option><option value="36">36</option>
              </select>
            </div>
            <button class="btn btn-p" onclick="addToCart(${p.id})" ${p.stock === 0 ? 'disabled' : ''}>
              ${p.stock > 0 ? 'ADD TO BAG' : 'SOLD OUT'}
            </button>
          </div>
        </div>
      `).join('');
    }

    // --- CART LOGIC ---
    function addToCart(id) {
      const size = document.getElementById(`size-${id}`).value;
      const product = db.find(p => p.id === id);
      const existing = cart.find(i => i.id === id && i.size === size);

      if(existing) {
        if(existing.qty < product.stock) existing.qty++;
        else return alert("No more stock available!");
      } else {
        cart.push({ ...product, size, qty: 1 });
      }
      updateUI();
      alert("Added to bag!");
    }

    function renderCartPage() {
      const list = document.getElementById('cart-list');
      const summary = document.getElementById('cart-summary');
      
      if(cart.length === 0) {
        list.innerHTML = `<div style="text-align:center; padding:50px;"><i data-lucide="shopping-cart" size="48"></i><p>Your bag is empty.</p><button class="btn btn-p" onclick="navigateTo('shop')">Go Shopping</button></div>`;
        summary.style.display = 'none';
      } else {
        summary.style.display = 'block';
        list.innerHTML = cart.map((item, idx) => `
          <div class="cart-row">
            <img src="${item.img}" style="width:80px; border-radius:8px;">
            <div><strong>${item.name}</strong><br><small>Size: ${item.size}</small></div>
            <div style="display:flex; align-items:center; gap:10px;">
              <button class="f-btn" onclick="updateQty(${idx}, -1)" style="padding:2px 10px;">-</button>
              <span>${item.qty}</span>
              <button class="f-btn" onclick="updateQty(${idx}, 1)" style="padding:2px 10px;">+</button>
            </div>
            <div style="font-weight:bold;">${item.price * item.qty}€</div>
          </div>
        `).join('');
        const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        document.getElementById('grand-total').innerText = `Total: ${total}€`;
      }
      lucide.createIcons();
    }

    function updateQty(idx, change) {
      const item = cart[idx];
      const product = db.find(p => p.id === item.id);
      if(change === 1 && item.qty < product.stock) item.qty++;
      else if(change === -1) item.qty--;
      if(item.qty === 0) cart.splice(idx, 1);
      updateUI();
      renderCartPage();
    }

    // --- ADMIN LOGIC ---
    function renderAdmin() {
      const body = document.getElementById('admin-table-body');
      body.innerHTML = db.map(p => `
        <tr style="border-bottom:1px solid #eee;">
          <td style="padding:10px;"><strong>${p.name}</strong></td>
          <td class="${p.stock < 5 ? 'stock-low' : ''}">${p.stock} units</td>
          <td><button onclick="deleteProd(${p.id})" style="color:red; background:none; border:none; cursor:pointer;">Delete</button></td>
        </tr>
      `).join('');
    }

    function addProduct() {
      const name = document.getElementById('a-name').value;
      const stock = parseInt(document.getElementById('a-stock').value);
      const img = document.getElementById('a-img').value;
      const price = parseInt(document.getElementById('a-price').value);
      const color = document.getElementById('a-color').value;

      if(!name || isNaN(stock) || !img) return alert("Fill all fields!");

      db.push({ id: Date.now(), name, color, price, stock, img });
      save(); renderAdmin(); alert("Product Added!");
    }

    function deleteProd(id) {
      db = db.filter(p => p.id !== id);
      save(); renderAdmin();
    }

    // --- SIMULATED PAYMENT & WHATSAPP ---
    function startPaymentFlow() {
      if(confirm("Ready to complete order? This will summarize your bag and open WhatsApp.")) {
        const phone = "34602097864";
        let msg = `*NEW ORDER - RIZWAN ALI*%0A--------------------------%0A`;
        cart.forEach(item => {
          msg += `• ${item.name} | Size ${item.size} | x${item.qty} (${item.price * item.qty}€)%0A`;
          const p = db.find(orig => orig.id === item.id);
          if(p) p.stock -= item.qty;
        });
        const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        msg += `--------------------------%0A*TOTAL: ${total}€*%0A%0APlease confirm delivery!`;
        
        save();
        cart = [];
        updateUI();
        window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        navigateTo('shop');
      }
    }

    function updateUI() {
      localStorage.setItem('rizwan_pro_cart', JSON.stringify(cart));
      document.getElementById('cart-badge').innerText = cart.reduce((s, i) => s + i.qty, 0);
    }

    function save() {
      localStorage.setItem('rizwan_pro_db', JSON.stringify(db));
    }

    // --- INIT ---
    lucide.createIcons();
    renderShop();
    updateUI();
  </script>
</body>
</html>
