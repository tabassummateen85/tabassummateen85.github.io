<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rizwan Ali Jeans | WhatsApp Shop</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background-color: #f4f4f4;
  }

  /* NAVBAR */
  .navbar {
    display: flex;
    justify-content: center;
    padding: 20px;
    background: #000;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 3px;
  }

  /* HERO */
  .hero {
    height: 50vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('IMG-20260418-WA0001.jpg') center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
  }

  /* PRODUCTS SECTION */
  .products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 40px 10px;
  }

  .card {
    background: white;
    width: 300px;
    margin: 15px;
    padding: 15px;
    border-radius: 8px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
  }

  .card:hover { transform: translateY(-5px); }

  .card img {
    width: 100%;
    height: 350px;
    object-fit: cover;
    border-radius: 4px;
  }

  .card h3 { margin: 15px 0 5px; font-size: 20px; }

  /* SIZE SELECT */
  .size-select {
    width: 100%;
    padding: 10px;
    margin: 15px 0;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 16px;
    cursor: pointer;
  }

  /* WHATSAPP BUTTON */
  .whatsapp-btn {
    width: 100%;
    padding: 12px;
    background: #25D366;
    color: white;
    border: none;
    border-radius: 4px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
  }

  .whatsapp-btn:hover { background: #128C7E; }

  footer {
    background: #000;
    color: #fff;
    text-align: center;
    padding: 20px;
    margin-top: 50px;
  }

  @media (max-width: 600px) {
    .card { width: 90%; }
  }
</style>
</head>
<body>

<header class="navbar">
  <h1>Rizwan Ali Jeans</h1>
</header>

<section class="hero">
  <h2>Premium Collection 2026</h2>
  <p>Select your size and order via WhatsApp</p>
</section>

<section class="products">

  <div class="card">
    <img src="IMG-20260418-WA0001.jpg" alt="Blue Denim">
    <h3>Royal Blue Denim</h3>
    <select class="size-select">
      <option value="">Select Size</option>
      <option value="32">32</option>
      <option value="34">34</option>
      <option value="36">36</option>
    </select>
    <button class="whatsapp-btn" onclick="orderNow(this)">Order on WhatsApp</button>
  </div>

  <div class="card">
    <img src="IMG-20260418-WA0002.jpg" alt="Black Jeans">
    <h3>Midnight Black</h3>
    <select class="size-select">
      <option value="">Select Size</option>
      <option value="32">32</option>
      <option value="34">34</option>
      <option value="36">36</option>
    </select>
    <button class="whatsapp-btn" onclick="orderNow(this)">Order on WhatsApp</button>
  </div>

  <div class="card">
    <img src="IMG-20260418-WA0003.jpg" alt="Grey/Other Jeans">
    <h3>Urban Grey</h3>
    <select class="size-select">
      <option value="">Select Size</option>
      <option value="32">32</option>
      <option value="34">34</option>
      <option value="36">36</option>
    </select>
    <button class="whatsapp-btn" onclick="orderNow(this)">Order on WhatsApp</button>
  </div>

</section>

<footer>
  <p>© 2026 Rizwan Ali Jeans | Quality You Can Trust</p>
</footer>

<script>
function orderNow(button) {
  // --- CHANGE THIS TO YOUR NUMBER ---
  const phoneNumber = "923000000000"; 
  
  const card = button.parentElement;
  const productName = card.querySelector("h3").innerText;
  const size = card.querySelector(".size-select").value;

  if (size === "") {
    alert("Please select a size (32, 34, or 36) first!");
    return;
  }

  // Create the message text
  const message = `Hello Rizwan Ali Jeans! I would like to order:%0A%0A*Product:* ${productName}%0A*Size:* ${size}`;
  
  // WhatsApp Link
  const url = `https://wa.me/${phoneNumber}?text=${message}`;

  // Open WhatsApp
  window.open(url, '_blank');
}
</script>

</body>
</html>
