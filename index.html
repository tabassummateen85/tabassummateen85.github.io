<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rizwan Ali Jeans</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    line-height: 1.6;
    color: #333;
  }

  /* NAVBAR */
  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 5%;
    background: #000;
    color: white;
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  .navbar h1 {
    margin: 0;
    font-size: 24px;
    letter-spacing: 2px;
  }

  .navbar nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-weight: 500;
  }

  /* HERO */
  .hero {
    height: 70vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('IMG-20260418-WA0001.jpg') center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
  }

  .hero h2 {
    font-size: 3rem;
    margin-bottom: 10px;
  }

  .btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 30px;
    background: white;
    color: black;
    text-decoration: none;
    font-weight: bold;
    text-transform: uppercase;
    transition: 0.3s;
  }

  .btn:hover {
    background: #ddd;
  }

  /* PRODUCTS */
  .section-title {
    text-align: center;
    margin-top: 40px;
    font-size: 2rem;
  }

  .products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 40px 20px;
  }

  .card {
    width: 280px;
    margin: 20px;
    padding: 20px;
    border: 1px solid #eee;
    text-align: center;
    transition: all 0.3s ease;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
  }

  .card:hover {
    transform: translateY(-10px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  }

  .card img {
    width: 100%;
    height: auto;
    border-bottom: 1px solid #eee;
    margin-bottom: 15px;
  }

  /* SIZE SELECT & BUTTON */
  .size-select {
    display: block;
    margin: 15px auto;
    padding: 10px;
    width: 90%;
    border: 1px solid #333;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
  }

  .add-btn {
    width: 90%;
    padding: 12px;
    background: #000;
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    transition: 0.3s;
  }

  .add-btn:hover {
    background: #444;
  }

  /* CART BOX */
  #cartBox {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #000;
    color: white;
    padding: 15px 25px;
    border-radius: 50px;
    font-weight: bold;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    z-index: 1001;
  }

  /* FOOTER */
  footer {
    background: #000;
    color: #888;
    text-align: center;
    padding: 30px;
    margin-top: 40px;
  }

  /* MOBILE RESPONSIVENESS */
  @media (max-width: 768px) {
    .hero h2 { font-size: 2rem; }
    .card { width: 90%; }
  }
</style>
</head>

<body>

<header class="navbar">
  <h1>RIZWAN ALI</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#products">Shop</a>
  </nav>
</header>

<section id="home" class="hero">
  <div>
    <h2>Premium Jeans Collection</h2>
    <p>Modern Style. Perfect Fit. Crafted for You.</p>
    <a href="#products" class="btn">Shop Now</a>
  </div>
</section>

<h2 class="section-title">New Arrivals</h2>

<section id="products" class="products">

  <div class="card">
    <img src="IMG-20260418-WA0001.jpg" alt="Blue Denim Jeans">
    <h3>Classic Blue Denim</h3>
    <p>Premium Stretch Cotton</p>

    <select class="size-select">
      <option value="">Select Size</option>
      <option value="32">32</option>
      <option value="34">34</option>
      <option value="36">36</option>
    </select>

    <button class="add-btn" onclick="addToCart(this)">Add to Cart</button>
  </div>

  <div class="card">
    <img src="IMG-20260418-WA0002.jpg" alt="Black Jeans">
    <h3>Midnight Black</h3>
    <p>Slim Fit Design</p>

    <select class="size-select">
      <option value="">Select Size</option>
      <option value="32">32</option>
      <option value="34">34</option>
      <option value="36">36</option>
    </select>

    <button class="add-btn" onclick="addToCart(this)">Add to Cart</button>
  </div>

</section>

<div id="cartBox">🛒 Items: 0</div>

<footer>
  <p>© 2026 Rizwan Ali Jeans | Quality Guaranteed</p>
</footer>

<script>
let cartCount = 0;

function addToCart(button) {
  const card = button.parentElement;
  const select = card.querySelector(".size-select");
  const productName = card.querySelector("h3").innerText;
  const size = select.value;

  if (size === "") {
    alert("Please select a size (32, 34, or 36) before adding to cart!");
    select.focus();
    return;
  }

  cartCount++;
  document.getElementById("cartBox").innerText = "🛒 Items: " + cartCount;

  alert(`Success! ${productName} (Size ${size}) added to your cart.`);
}
</script>

</body>
</html>
